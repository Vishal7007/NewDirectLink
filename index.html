<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Get Direct Link</title>

    <meta name="theme-color" content="#222222">

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #222;
            color: #fff;
            margin: 0;
        }

        .container {
            background-color: #333;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.4);
            max-width: 450px;
            margin: 0 auto;
        }

        h1 {
            margin-top: 0;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #555;
            border-radius: 8px;
            background-color: #444;
            color: #fff;
            resize: vertical;
            margin-bottom: 15px;
            font-size: 15px;
        }

        button {
            background-color: #007BFF;
            color: #fff;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-size: 15px;
        }

        button:hover {
            opacity: 0.9;
        }

        a {
            color: #00a2ff;
            text-decoration: none;
        }

        #output {
            margin-top: 20px;
            word-break: break-word;
        }

        #myLink {
            display: inline-block;
            margin-top: 15px;
            font-size: 18px;
        }

        .apk-btn {
            display: inline-block;
            margin-top: 20px;
        }

        @media screen and (max-width: 480px) {
            .container {
                width: 100%;
                padding: 15px;
            }

            button {
                width: 100%;
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Get Direct Link</h1>

        <form onsubmit="processString(); return false;">

            <textarea id="inputText"
                placeholder="Paste your URL here..."
                rows="4"></textarea>

            <button type="button" onclick="pasteFromClipboard()">
                Paste
            </button>

            <button type="submit">
                Submit
            </button>

        </form>

        <div id="output"></div>

        <a id="myLink" target="_blank"></a>

        <br>

        <!-- APK DOWNLOAD BUTTON -->
        <a href="app.apk" download class="apk-btn">
            <button type="button">
                Download APK
            </button>
        </a>

    </div>

    <script>

        function getPastAlphabetDynamic(str) {

            return str.split('').map(char => {

                if (char >= 'A' && char <= 'Z') {

                    return String.fromCharCode(
                        (char.charCodeAt(0) - 65 - 2 + 26) % 26 + 65
                    );

                } else if (char >= 'a' && char <= 'z') {

                    return String.fromCharCode(
                        (char.charCodeAt(0) - 97 - 2 + 26) % 26 + 97
                    );

                } else {

                    return char;
                }

            }).join('');
        }

        function processString() {

            const inputText1 =
                document.getElementById('inputText').value;

            const lastSlashPos =
                inputText1.lastIndexOf('/');

            if (lastSlashPos !== -1) {

                let lastDigits =
                    inputText1.substring(lastSlashPos + 1);

                lastDigits =
                    getPastAlphabetDynamic(lastDigits);

                const baseString =
                    "https://zply.fun/m?=b5893044071/u/";

                const finalString =
                    baseString + lastDigits;

                console.log("Last digits:", lastDigits);

                console.log("Final String:", finalString);

                const outputDiv =
                    document.getElementById('output');

                outputDiv.innerHTML =
                    `Decoded: <strong>${lastDigits}</strong>`;

                const linkElement =
                    document.getElementById("myLink");

                linkElement.href = finalString;

                linkElement.innerHTML =
                    `Open Direct Link`;

            } else {

                const outputDiv =
                    document.getElementById('output');

                outputDiv.innerHTML =
                    `No '/' found in the input string.`;
            }
        }

        function pasteFromClipboard() {

            navigator.clipboard.readText()

                .then(function (clipboardText) {

                    const inputText =
                        document.getElementById('inputText');

                    inputText.value = clipboardText;
                })

                .catch(function (error) {

                    console.error(
                        'Failed to read clipboard: ',
                        error
                    );
                });
        }

        // Register Service Worker

        if ('serviceWorker' in navigator) {

            window.addEventListener('load', () => {

                navigator.serviceWorker
                    .register('/sw.js')

                    .then(reg => {
                        console.log('Service Worker Registered');
                    })

                    .catch(err => {
                        console.log(
                            'Service Worker Failed',
                            err
                        );
                    });
            });
        }

    </script>

</body>

</html>
