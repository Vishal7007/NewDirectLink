<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover">

    <meta name="theme-color"
        content="#0f172a">

    <meta name="mobile-web-app-capable"
        content="yes">

    <meta name="apple-mobile-web-app-capable"
        content="yes">

    <meta name="apple-mobile-web-app-status-bar-style"
        content="black-translucent">

    <title>DirectLink</title>

    <link rel="manifest"
        href="site.webmanifest">

    <link rel="apple-touch-icon"
        href="apple-touch-icon.png">

    <link rel="icon"
        type="image/png"
        sizes="32x32"
        href="favicon-32x32.png">

    <link rel="icon"
        type="image/png"
        sizes="16x16"
        href="favicon-16x16.png">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>

        * {

            margin: 0;
            padding: 0;

            box-sizing: border-box;

            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {

            width: 100%;
            height: 100%;

            overflow: hidden;

            touch-action: manipulation;
        }

        body {

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 16px;

            font-family: 'Inter', sans-serif;

            background:
                radial-gradient(circle at top,
                    #1e293b 0%,
                    #0f172a 45%,
                    #020617 100%);

            color: white;

            position: fixed;

            inset: 0;
        }

        .bg-blur {

            position: absolute;

            width: 320px;
            height: 320px;

            border-radius: 50%;

            background:
                linear-gradient(135deg,
                    #2563eb,
                    #7c3aed);

            filter: blur(120px);

            opacity: 0.18;

            top: -120px;
            right: -120px;
        }

        .container {

            position: relative;

            width: 100%;
            max-width: 460px;

            padding: 28px 22px;

            border-radius: 30px;

            background:
                rgba(15, 23, 42, 0.72);

            backdrop-filter: blur(18px);

            border:
                1px solid rgba(255,255,255,0.08);

            box-shadow:
                0 25px 60px rgba(0,0,0,0.45);

            overflow: hidden;
        }

        .logo {

            width: 78px;
            height: 78px;

            margin: auto;

            border-radius: 24px;

            background:
                linear-gradient(135deg,
                    #2563eb,
                    #7c3aed);

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 34px;

            box-shadow:
                0 14px 35px rgba(37,99,235,0.45);
        }

        h1 {

            margin-top: 22px;

            text-align: center;

            font-size: 38px;
            font-weight: 800;

            letter-spacing: -1px;
        }

        .subtitle {

            margin-top: 10px;

            text-align: center;

            color: #94a3b8;

            font-size: 14px;

            line-height: 1.6;
        }

        .input-box {

            margin-top: 28px;
        }

        textarea {

            width: 100%;
            height: 145px;

            padding: 18px;

            border-radius: 20px;

            border:
                1px solid rgba(255,255,255,0.08);

            background:
                rgba(255,255,255,0.05);

            color: white;

            resize: none;

            outline: none;

            font-size: 15px;

            font-family: 'Inter', sans-serif;

            transition: 0.25s;

            overflow-y: auto;
        }

        textarea:focus {

            border:
                1px solid rgba(59,130,246,0.8);

            box-shadow:
                0 0 0 4px rgba(37,99,235,0.14);
        }

        textarea::placeholder {

            color: #64748b;
        }

        .buttons {

            display: flex;

            gap: 12px;

            margin-top: 18px;
        }

        button {

            flex: 1;

            border: none;

            border-radius: 18px;

            padding: 15px 16px;

            font-size: 15px;
            font-weight: 600;

            cursor: pointer;

            transition: 0.25s;

            font-family: 'Inter', sans-serif;
        }

        .paste-btn {

            background:
                rgba(255,255,255,0.06);

            color: white;

            border:
                1px solid rgba(255,255,255,0.08);
        }

        .paste-btn:hover {

            background:
                rgba(255,255,255,0.12);
        }

        .submit-btn {

            background:
                linear-gradient(135deg,
                    #2563eb,
                    #7c3aed);

            color: white;

            box-shadow:
                0 14px 35px rgba(37,99,235,0.35);
        }

        .submit-btn:hover {

            transform: translateY(-2px);
        }

        #output {

            margin-top: 22px;

            padding: 18px;

            border-radius: 18px;

            background:
                rgba(255,255,255,0.05);

            border:
                1px solid rgba(255,255,255,0.06);

            color: #cbd5e1;

            font-size: 14px;

            line-height: 1.5;

            word-break: break-word;

            display: none;
        }

        .result-title {

            color: #60a5fa;

            font-size: 13px;

            margin-bottom: 8px;

            font-weight: 600;
        }

        .footer {

            margin-top: 24px;

            text-align: center;

            font-size: 12px;

            color: #64748b;
        }

        @media(max-width: 520px) {

            body {
                padding: 12px;
            }

            .container {

                padding: 24px 18px;

                border-radius: 24px;
            }

            h1 {
                font-size: 32px;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

    </style>

</head>

<body>

    <div class="bg-blur"></div>

    <div class="container">

        <div class="logo">
            🔗
        </div>

        <h1>
            DirectLink
        </h1>

        <div class="subtitle">
            Convert shared links into direct access URLs instantly.
        </div>

        <form onsubmit="processString(); return false;">

            <div class="input-box">

                <textarea
                    id="inputText"
                    placeholder="Paste your URL here..."></textarea>

            </div>

            <div class="buttons">

                <button
                    type="button"
                    class="paste-btn"
                    onclick="pasteFromClipboard()">

                    Paste

                </button>

                <button
                    type="submit"
                    class="submit-btn">

                    Generate

                </button>

            </div>

        </form>

        <div id="output"></div>

        <div class="footer">
            Fast • Secure • Minimal
        </div>

    </div>

    <script>

        function getPastAlphabetDynamic(str) {

            return str.split('').map(char => {

                if (char >= 'A' && char <= 'Z') {

                    return String.fromCharCode(
                        (char.charCodeAt(0) - 65 - 2 + 26) % 26 + 65
                    );

                } else if (char >= 'a' && char <= 'z') {

                    return String.fromCharCode(
                        (char.charCodeAt(0) - 97 - 2 + 26) % 26 + 97
                    );

                } else {

                    return char;
                }

            }).join('');
        }

        function processString() {

            const inputText1 =
                document.getElementById('inputText')
                .value
                .trim();

            const outputDiv =
                document.getElementById('output');

            if (!inputText1) {

                outputDiv.style.display = 'block';

                outputDiv.innerHTML =
                    `<div class="result-title">
                        Error
                    </div>
                    Please paste a valid URL.`;

                return;
            }

            const lastSlashPos =
                inputText1.lastIndexOf('/');

            if (lastSlashPos !== -1) {

                let lastDigits =
                    inputText1.substring(lastSlashPos + 1);

                lastDigits =
                    getPastAlphabetDynamic(lastDigits);

                const baseString =
                    "https://zply.fun/m?=b5893044071/u/";

                const finalString =
                    baseString + lastDigits;

                outputDiv.style.display = 'block';

                outputDiv.innerHTML =
                    `<div class="result-title">
                        Opening Browser...
                    </div>
                    Redirecting to generated direct link.`;

                // Vibration feedback for Android

                if (navigator.vibrate) {
                    navigator.vibrate(40);
                }

                // Open in external browser

                setTimeout(() => {

                    window.open(
                        finalString,
                        '_blank'
                    );

                }, 350);

            } else {

                outputDiv.style.display = 'block';

                outputDiv.innerHTML =
                    `<div class="result-title">
                        Invalid URL
                    </div>
                    No '/' found in the input string.`;
            }
        }

        function pasteFromClipboard() {

            navigator.clipboard.readText()

                .then(function (clipboardText) {

                    document.getElementById('inputText')
                        .value = clipboardText;

                })

                .catch(function (error) {

                    console.error(
                        'Clipboard read failed:',
                        error
                    );

                });
        }

        // Auto focus textarea

        window.onload = () => {

            document
                .getElementById('inputText')
                .focus();
        };

        // Service Worker

        if ('serviceWorker' in navigator) {

            window.addEventListener('load', () => {

                navigator.serviceWorker
                    .register('/NewDirectLink/sw.js')

                    .then(() => {

                        console.log(
                            'Service Worker Registered'
                        );

                    })

                    .catch(err => {

                        console.log(
                            'Service Worker Error:',
                            err
                        );

                    });

            });
        }

    </script>

</body>

</html>
