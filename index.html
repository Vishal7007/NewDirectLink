<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta name="theme-color"
        content="#222222">

    <title>Get Direct Link</title>

    <!-- PWA -->

    <link rel="manifest"
        href="site.webmanifest">

    <!-- Icons -->

    <link rel="apple-touch-icon"
    href="apple-touch-icon.png">

    <link rel="icon"
        type="image/png"
        sizes="32x32"
        href="favicon-32x32.png">

    <link rel="icon"
        type="image/png"
        sizes="16x16"
        href="favicon-16x16.png">

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;
            padding: 20px;

            font-family: Arial, sans-serif;

            background-color: #222;
            color: white;

            text-align: center;
        }

        .container {

            max-width: 450px;

            margin: auto;

            background: #333;

            padding: 20px;

            border-radius: 14px;

            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        h1 {
            margin-top: 0;
        }

        textarea {

            width: 100%;

            padding: 12px;

            border: 1px solid #555;

            border-radius: 8px;

            background: #444;

            color: white;

            resize: vertical;

            font-size: 15px;

            margin-bottom: 15px;
        }

        button {

            width: 100%;

            padding: 12px;

            margin-top: 10px;

            border: none;

            border-radius: 8px;

            background: #007BFF;

            color: white;

            font-size: 15px;

            cursor: pointer;
        }

        button:hover {
            opacity: 0.92;
        }

        #output {

            margin-top: 20px;

            word-break: break-word;
        }

        #myLink {

            display: inline-block;

            margin-top: 15px;

            color: #00a2ff;

            font-size: 18px;

            text-decoration: none;
        }

        .apk-btn {
            margin-top: 20px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Get Direct Link</h1>

        <form onsubmit="processString(); return false;">

            <textarea
                id="inputText"
                rows="4"
                placeholder="Paste your URL here..."></textarea>

            <button
                type="button"
                onclick="pasteFromClipboard()">

                Paste

            </button>

            <button type="submit">

                Submit

            </button>

        </form>

        <div id="output"></div>

        <a id="myLink"
            target="_blank"></a>

        <!-- APK DOWNLOAD -->

        <div class="apk-btn">

            <a href="app.apk" download>

                <button type="button">

                    Download APK

                </button>

            </a>

        </div>

    </div>

    <script>

        function getPastAlphabetDynamic(str) {

            return str.split('').map(char => {

                if (char >= 'A' && char <= 'Z') {

                    return String.fromCharCode(
                        (char.charCodeAt(0) - 65 - 2 + 26) % 26 + 65
                    );

                } else if (char >= 'a' && char <= 'z') {

                    return String.fromCharCode(
                        (char.charCodeAt(0) - 97 - 2 + 26) % 26 + 97
                    );

                } else {

                    return char;
                }

            }).join('');
        }

        function processString() {

            const inputText1 =
                document.getElementById('inputText').value;

            const lastSlashPos =
                inputText1.lastIndexOf('/');

            if (lastSlashPos !== -1) {

                let lastDigits =
                    inputText1.substring(lastSlashPos + 1);

                lastDigits =
                    getPastAlphabetDynamic(lastDigits);

                const baseString =
                    "https://zply.fun/m?=b5893044071/u/";

                const finalString =
                    baseString + lastDigits;

                const outputDiv =
                    document.getElementById('output');

                outputDiv.innerHTML =
                    `Decoded: <strong>${lastDigits}</strong>`;

                const linkElement =
                    document.getElementById("myLink");

                linkElement.href =
                    finalString;

                linkElement.innerHTML =
                    `Open Direct Link`;

            } else {

                const outputDiv =
                    document.getElementById('output');

                outputDiv.innerHTML =
                    `No '/' found in the input string.`;
            }
        }

        function pasteFromClipboard() {

            navigator.clipboard.readText()

                .then(function (clipboardText) {

                    document.getElementById('inputText').value =
                        clipboardText;

                })

                .catch(function (error) {

                    console.error(
                        'Clipboard read failed:',
                        error
                    );

                });
        }

        // SERVICE WORKER

        if ('serviceWorker' in navigator) {

            window.addEventListener('load', () => {

                navigator.serviceWorker
                    .register('sw.js')

                    .then(() => {

                        console.log(
                            'Service Worker Registered'
                        );

                    })

                    .catch(err => {

                        console.log(
                            'Service Worker Error:',
                            err
                        );

                    });

            });
        }

    </script>

</body>

</html>
